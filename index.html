<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#8e44ad,#ff69b4);
      overflow:hidden;
    }

    .container{
      width:90%;
      max-width:500px;
      background:white;
      padding:35px;
      border-radius:25px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      color:#ff1493;
      margin-bottom:10px;
    }

    .subtitle{
      color:gray;
      margin-bottom:25px;
    }

    .question{
      font-size:28px;
      font-weight:bold;
      margin-bottom:25px;
      color:#333;
    }

    .option{
      width:100%;
      border:none;
      padding:15px;
      margin:10px 0;
      border-radius:15px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      background:#ffd6ea;
      color:#d63384;
      font-weight:bold;
    }

    .option:hover{
      background:#ffb6d5;
      transform:scale(1.03);
    }

    .wrong{
      color:red;
      margin-top:15px;
      font-weight:bold;
    }

    /* Birthday Page */

    .birthday-page{
      position:fixed;
      inset:0;
      background:#ff9ecf;
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      overflow:hidden;
      text-align:center;
      padding:20px;
    }

    .birthday-title{
      font-size:60px;
      color:white;
      font-weight:bold;
      animation:pop 1s ease;
      text-shadow:0 0 20px rgba(255,255,255,0.8);
      z-index:2;
    }

    .photo{
      width:250px;
      height:250px;
      object-fit:cover;
      border-radius:25px;
      border:6px solid white;
      margin-top:30px;
      animation:pop 1.5s ease;
      z-index:2;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .message{
      margin-top:20px;
      color:white;
      font-size:22px;
      font-weight:bold;
      z-index:2;
    }

    @keyframes pop{
      from{
        transform:scale(0.5);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    /* Confetti */

    .confetti{
      position:absolute;
      width:12px;
      height:12px;
      top:-20px;
      animation:fall linear infinite;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(720deg);
      }
    }

  </style>
</head>
<body>

  <!-- Quiz -->
  <div class="container" id="quizBox">

    <h1>Quiz</h1>
    <p class="subtitle">Jawab dengan benar</p>

    <div id="questionNumber"></div>
    <div class="question" id="question"></div>

    <div id="options"></div>

    <div class="wrong" id="wrongText"></div>

  </div>

  <!-- Birthday -->
  <div class="birthday-page" id="birthdayPage">

    <h1 class="birthday-title">
      SELAMAT ULANG TAHUN 🎉
    </h1>

    <!-- GANTI FOTO -->
    <img
      src="fatih.jpeg"
      class="photo"
    >

    <div class="message">
      Semoga dimudahkan menggapai cita-citanya, sehat selalu, dan bahagia terus 
    </div>

    <!-- GANTI LAGU -->
    <audio id="birthdaySong" loop>
      <source src="hbd.mp3" type="audio/mpeg">
    </audio>

  </div>

  <script>

    const questions = [
      {
        question: "1 + 1 = ?",
        options: ["1","2","3","4"],
        answer: "2"
      },
      {
        question: "5 x 2 = ?",
        options: ["7","8","10","12"],
        answer: "10"
      },
      {
        question: "12 - 4 = ?",
        options: ["6","7","8","9"],
        answer: "8"
      }
    ];

    let currentQuestion = 0;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const wrongText = document.getElementById("wrongText");
    const questionNumber = document.getElementById("questionNumber");

    function loadQuestion(){

      wrongText.innerHTML = "";

      const q = questions[currentQuestion];

      questionNumber.innerHTML =
        `Soal ${currentQuestion + 1} dari ${questions.length}`;

      questionEl.innerHTML = q.question;

      optionsEl.innerHTML = "";

      q.options.forEach(option => {

        const button = document.createElement("button");

        button.classList.add("option");

        button.innerHTML = option;

        button.onclick = () => checkAnswer(option);

        optionsEl.appendChild(button);

      });

    }

    function checkAnswer(answer){

      if(answer === questions[currentQuestion].answer){

        currentQuestion++;

        if(currentQuestion < questions.length){

          loadQuestion();

        } else {

          showBirthdayPage();

        }

      } else {

        wrongText.innerHTML = "Jawaban salah 😅 coba lagi!";

      }

    }

    function showBirthdayPage(){

      document.getElementById("quizBox").style.display = "none";

      const page = document.getElementById("birthdayPage");

      page.style.display = "flex";

      document.getElementById("birthdaySong").play();

      createConfetti();
      createFireworks();

    }

    function createConfetti(){

  // Confetti jatuh dari atas
  for(let i=0; i<120; i++){

    const confetti = document.createElement("div");

    confetti.classList.add("confetti");

    confetti.style.left = Math.random() * 100 + "vw";

    confetti.style.background =
      ["#ff1493", "#ffffff", "#ff69b4", "#ffd700"]
      [Math.floor(Math.random()*4)];

    confetti.style.animationDuration =
      (Math.random()*3 + 2) + "s";

    confetti.style.opacity = Math.random();

    confetti.style.transform =
      `rotate(${Math.random()*360}deg)`;

    document.body.appendChild(confetti);

  }

  // Confetti dari kanan & kiri
  for(let i=0; i<80; i++){

    const sideConfetti = document.createElement("div");

    sideConfetti.style.position = "absolute";

    sideConfetti.style.width = "14px";
    sideConfetti.style.height = "14px";

    sideConfetti.style.background =
      ["#ff1493", "#ffffff", "#ff69b4", "#ffd700"]
      [Math.floor(Math.random()*4)];

    sideConfetti.style.top =
      Math.random() * 100 + "vh";

    const fromLeft = Math.random() > 0.5;

    sideConfetti.style.left =
      fromLeft ? "-20px" : "100vw";

    document.body.appendChild(sideConfetti);

    sideConfetti.animate(
      [
        {
          transform:
            "translateX(0px) rotate(0deg)"
        },
        {
          transform:
            `translateX(${fromLeft ? 1200 : -1200}px)
             translateY(${Math.random()*400 - 200}px)
             rotate(720deg)`
        }
      ],
      {
        duration: Math.random()*3000 + 2500,
        iterations: Infinity
      }
    );

  }

}
function createFireworks(){

  setInterval(() => {

    const firework = document.createElement("div");

    firework.style.position = "absolute";

    firework.style.left =
      Math.random() * 100 + "vw";

    firework.style.top =
      Math.random() * 60 + "vh";

    firework.style.width = "10px";
    firework.style.height = "10px";

    firework.style.borderRadius = "50%";

    firework.style.background = "white";

    document.body.appendChild(firework);

    for(let i=0; i<25; i++){

      const particle = document.createElement("div");

      particle.style.position = "absolute";

      particle.style.width = "8px";
      particle.style.height = "8px";

      particle.style.borderRadius = "50%";

      particle.style.background =
        ["#ff1493","#ffd700","#00ffff","#ffffff","#ff69b4"]
        [Math.floor(Math.random()*5)];

      particle.style.left = firework.style.left;
      particle.style.top = firework.style.top;

      document.body.appendChild(particle);

      const angle = Math.random() * 360;

      const distance = Math.random() * 200 + 50;

      particle.animate(
        [
          {
            transform: "translate(0,0)",
            opacity:1
          },
          {
            transform:
              `translate(
                ${Math.cos(angle) * distance}px,
                ${Math.sin(angle) * distance}px
              )`,
            opacity:0
          }
        ],
        {
          duration:1500,
          easing:"ease-out"
        }
      );

      setTimeout(() => {
        particle.remove();
      }, 1500);

    }

    setTimeout(() => {
      firework.remove();
    }, 100);

  }, 800);

}

    loadQuestion();

  </script>

</body>
</html>
